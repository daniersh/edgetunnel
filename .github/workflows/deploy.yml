name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: '强制部署'
        required: false
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ADMIN password
        run: |
          if [ -z "${{ secrets.ADMIN }}" ]; then
            echo "::error::ADMIN 未设置！"
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ADMIN: ${{ secrets.ADMIN }}
        run: |
          echo "Deploying edgetunnel to Cloudflare Workers..."
          npx wrangler deploy --name edgetunnel-worker
