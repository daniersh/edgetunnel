name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0  * * "*
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-2404
    if: ${ github.event.repository.fork }

     steps:
      - name: Checkout target repo
        uses: actions/checkout@v3

      - name: Sync upstream changes
       id: sync
       uses: aorpsby/Fork-Sync-With-Upstream-action@v3.4
       with:
          upstream_sync_repo: zizifn/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${ secrets.GITHUB_TOKEN }
          test_mode: false

    - name: Sync check
      if: failure()
      run:
        echo "[Error] Due to upstream repository's workflow file change, GitHub automatically suspended this auto sync"
        exit 1
